services:
  # ── Backend (FastAPI) ─────────────────────────────────────────────────────
  - type: web
    name: agrimarket-backend
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python seed_data.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agrimarket-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

  # ── Frontend (React static site) ─────────────────────────────────────────
  - type: web
    name: agrimarket-frontend
    env: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        # After first deploy, copy the backend URL from Render dashboard
        # and paste it here (e.g. https://agrimarket-backend.onrender.com)
        # then click "Save Changes" → "Manual Deploy"
        value: https://agrimarket-backend.onrender.com

# ── PostgreSQL database ───────────────────────────────────────────────────
databases:
  - name: agrimarket-db
    databaseName: agrimarket
    user: agrimarket_user
    plan: free
